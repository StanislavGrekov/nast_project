{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Сайт Настеньки</title>
    <link href="{% static  "main.css" %}" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<header>
    <div id = "logo" onclick="slowScroll('#top')">
       <span>AnastasiyaFotograf</span>
    </div>
    <div id="about">
        <a href="#" title="Обо мне" onclick="slowScroll('#main')">Обо мне</a>
        <a href="#" title="Портфолио" onclick="slowScroll('#port')">Портфолио</a>
        <a href="#" title="Цены" onclick="slowScroll('#price')">Цены</a>
        <a href="#" title="Контакты" onclick="slowScroll('#cont')">Контакты</a>
    </div>
</header>

<div id="top">
    <h1>Foto</h1>
    <h3>like style my life</h3>
</div>


<script src="{% static "js/jquery-3.6.4.min.js" %}"></script>
<script src="{% static 'js/bootstrap.min.js' %}"></script>



<script>
    function slowScroll(id) {
    $('body').animate({
    scrollTop: $(id).offset().top
    }; 500);
    }

    $(document).on("scroll", function () {
        if($(windows).scrollTop() === 0)
            $("header").removeClass("fixed");
        else
            $("header").attr("class","fixed");
    });

</script>


</body>
</html>
